name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Build C++ engine
        run: cd engine && make

      - name: Cache Ghostscript source
        uses: actions/cache@v4
        with:
          path: gs/build/*.tar.gz
          key: gs-source-${{ hashFiles('gs/build-gs.sh') }}

      - name: Build Ghostscript
        run: cd gs && bash build-gs.sh

      - name: Run tests
        run: bun run test

      - name: Build stable app
        run: bun run build:stable

      - name: List artefacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
            CHANGELOG.md
          generate_release_notes: true
