name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Build C++ engine
        run: cd engine && make

      - name: Cache Ghostscript source
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: gs/build/*.tar.gz
          key: gs-source-${{ hashFiles('gs/build-gs.sh') }}

      - name: Build Ghostscript
        run: cd gs && bash build-gs.sh

      - name: Run tests
        run: bun run test

      - name: Build stable app
        run: bun run build:stable

      - name: List artefacts
        run: ls -la artifacts/

      # Publish a GitHub Release only on the public release repo - it is the
      # auto-update source. Elsewhere (e.g. the private source-of-truth repo)
      # every step above still runs as a pre-release build smoke test, but a
      # Release published here would be a separate, unused binary that no
      # client reads, so skip the publish.
      - name: Create GitHub Release
        if: github.repository == 'samrobn/tabbo'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            artifacts/*
            CHANGELOG.md
          generate_release_notes: true
