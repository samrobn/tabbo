name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Build C++ engine
        run: cd engine && make

      - name: Cache Ghostscript source
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: gs/build/*.tar.gz
          key: gs-source-${{ hashFiles('gs/build-gs.sh') }}

      - name: Build Ghostscript
        run: cd gs && bash build-gs.sh

      - name: Run tests
        run: bun run test

      - name: Build stable app
        run: bun run build:stable

      - name: List artefacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: |
            artifacts/*
            CHANGELOG.md
          generate_release_notes: true
